<!DOCTYPE html>
<html>
<head>
    <title>Huy - Giám sát bãi xe Real-time</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
</head>
<body style="text-align: center; font-family: Arial; background: #2c3e50; color: white;">
    <h1>HỆ THỐNG GIÁM SÁT BÃI XE (CLOUD)</h1>
    <div style="font-size: 100px; margin-top: 50px;">
        Số chỗ trống: <span id="spots" style="color: #27ae60;">--</span>
    </div>

    <script>
        // Copy cấu hình từ Firebase Console của Huy vào đây
        const firebaseConfig = {
            apiKey: "...",
            authDomain: "...",
            databaseURL: "https://TEN-DU-AN-CUA-HUY.firebaseio.com",
            projectId: "...",
            // ... các thông số khác
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Lắng nghe sự thay đổi từ Firebase
        db.ref('parking_data/available_spots').on('value', (snapshot) => {
            document.getElementById('spots').innerText = snapshot.val();
        });
    </script>
</body>
</html>
