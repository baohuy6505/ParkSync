<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parking Cloud - Mô phỏng vòng tròn ảo 5 cổng</title>
    <style>
      * {
        box-sizing: border-box;
        user-select: none;
      }
      body {
        background: #0a0f1c;
        font-family: "Segoe UI", "Roboto", monospace;
        color: #e2e8f0;
        margin: 0;
        padding: 20px;
        overflow-x: auto;
      }
      h1 {
        text-align: center;
        font-weight: 400;
        font-size: 1.8rem;
        margin-top: 0;
      }
      .sub {
        text-align: center;
        color: #8ba0bc;
        margin-bottom: 30px;
      }
      /* Container cho vòng tròn */
      .ring-container {
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 20px 0;
        position: relative;
      }
      svg {
        background: #111827;
        border-radius: 32px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        width: 100%;
        max-width: 900px;
        height: auto;
        cursor: pointer;
      }
      .gate-node {
        cursor: pointer;
        transition: filter 0.2s;
      }
      .gate-node:hover {
        filter: drop-shadow(0 0 8px #3b82f6);
      }
      .gate-label {
        font-size: 14px;
        font-weight: bold;
        fill: #f1f5f9;
      }
      .gate-clock {
        font-size: 11px;
        fill: #94a3b8;
      }
      .arrow-marker {
        fill: #475569;
      }
      .link-line {
        stroke: #334155;
        stroke-width: 2;
        stroke-dasharray: 5 5;
      }
      /* Animation cho chấm sáng */
      .moving-dot {
        fill: #facc15;
        filter: drop-shadow(0 0 4px gold);
        r: 6;
      }
      /* Bảng điều khiển bên dưới */
      .panels {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        margin-top: 30px;
      }
      .queue-panel {
        flex: 2;
        background: #111827;
        border-radius: 24px;
        padding: 16px;
      }
      .history-panel {
        flex: 3;
        background: #111827;
        border-radius: 24px;
        padding: 16px;
      }
      .gate-queues {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
        margin-top: 12px;
      }
      .queue-card {
        background: #1e293b;
        border-radius: 20px;
        padding: 12px;
      }
      .queue-card h4 {
        margin: 0 0 8px 0;
        display: flex;
        justify-content: space-between;
      }
      .queue-list {
        max-height: 180px;
        overflow-y: auto;
        font-size: 0.7rem;
        font-family: monospace;
      }
      .queue-item {
        border-bottom: 1px solid #334155;
        padding: 4px;
      }
      .badge {
        background: #3b82f6;
        border-radius: 20px;
        padding: 0 6px;
        font-size: 0.65rem;
      }
      table {
        width: 100%;
        font-size: 0.75rem;
        border-collapse: collapse;
      }
      th,
      td {
        text-align: left;
        padding: 6px 4px;
        border-bottom: 1px solid #2d3a4e;
      }
      .filter-bar {
        display: flex;
        gap: 12px;
        margin-bottom: 16px;
        align-items: center;
      }
      input,
      button {
        background: #1e293b;
        border: none;
        padding: 6px 12px;
        border-radius: 40px;
        color: white;
      }
      button {
        cursor: pointer;
        background: #2c7da0;
      }
      button.ra {
        background: #e63946;
      }
      .clock-update {
        font-size: 0.7rem;
        color: #a0c4ff;
      }
    </style>
  </head>
  <body>
    <h1>🔄 Hệ thống bãi xe phân tán – Vòng tròn ảo 5 cổng</h1>
    <div class="sub">
      📡 Tin nhắn (xe) được truyền theo chiều kim đồng hồ qua 4 pha: LOCK →
      TEMP_ADD → SORT → COMMIT
    </div>

    <div class="ring-container">
      <svg
        id="ringSvg"
        viewBox="0 0 800 600"
        xmlns="http://www.w3.org/2000/svg"
      >
        <defs>
          <marker
            id="arrowhead"
            markerWidth="8"
            markerHeight="8"
            refX="7"
            refY="4"
            orient="auto"
          >
            <polygon points="0 0, 8 4, 0 8" fill="#5b6e8c" />
          </marker>
        </defs>
        <!-- Các đường nối sẽ được vẽ bằng JS -->
      </svg>
    </div>

    <div class="panels">
      <div class="queue-panel">
        <h3>📦 Bảng tạm (TEMP QUEUE) của từng cổng</h3>
        <div id="queuesContainer" class="gate-queues"></div>
      </div>
      <div class="history-panel">
        <div class="filter-bar">
          <span>🔍 Lọc biển số:</span>
          <input type="text" id="plateFilter" placeholder="VD: 43A-12345" />
          <button onclick="clearFilter()">Xóa lọc</button>
          <button onclick="refreshAllData()">🔄 Làm mới</button>
        </div>
        <h3>📋 Lịch sử đường đi của xe</h3>
        <div style="max-height: 280px; overflow-y: auto">
          <table id="historyTable">
            <thead>
              <tr>
                <th>Thời gian</th>
                <th>Cổng</th>
                <th>Vòng</th>
                <th>Hành động</th>
                <th>Biển số</th>
                <th>Clock</th>
              </tr>
            </thead>
            <tbody id="historyBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      // Cấu hình 5 cổng (thay đổi port nếu chạy khác)
      const GATES = [
        // { name: "GATE_A", port: 8080, url: "http://localhost:8080", angle: -90 },
        // { name: "GATE_B", port: 8081, url: "http://localhost:8081", angle: -18 },
        // { name: "GATE_C", port: 8082, url: "http://localhost:8082", angle: 54 },
        // { name: "GATE_D", port: 8083, url: "http://localhost:8083", angle: 126 },
        // { name: "GATE_E", port: 8084, url: "http://localhost:8084", angle: 198 }
        {
          name: "GATE_A",
          port: 8080,
          url: "https://cloudpark-iq-huy.onrender.com",
          angle: -90,
        },
        {
          name: "GATE_B",
          port: 8081,
          url: "https://parksync-dskl.onrender.com",
          angle: 30,
        },
        {
          name: "GATE_C",
          port: 8082,
          url: "https://cloudpark-iq-hai.onrender.com",
          angle: 150,
        },
        //{ name: "GATE_D", port: 8083, url: "https://cloudpark-iq-huy.onrender.com/api/parking/v2/history", angle: 126 },
        //{ name: "GATE_E", port: 8084, url: "https://cloudpark-iq-huy.onrender.com/api/parking/v2/history", angle: 198 }
      ];
      // Sắp xếp theo đúng thứ tự ring: A(0) -> B(1) -> C(2) -> D(3) -> E(4) -> A
      // const RING_ORDER = [0, 1, 2, 3, 4, 0]; // chỉ số trong GATES
      const RING_ORDER = [0, 1, 2, 0];
      let currentFilter = "";
      let animationInterval = null;
      let activeDot = null;
      let currentStep = 0;

      // Hàm vẽ SVG vòng tròn và các node
      function drawRing() {
        const svg = document.getElementById("ringSvg");
        svg.innerHTML = `<defs>
            <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
                <polygon points="0 0, 8 4, 0 8" fill="#5b6e8c" />
            </marker>
        </defs>`;
        const centerX = 400,
          centerY = 300,
          radius = 200;
        // Lưu tọa độ các node
        const coords = [];
        GATES.forEach((gate, idx) => {
          const rad = (gate.angle * Math.PI) / 180;
          const x = centerX + radius * Math.cos(rad);
          const y = centerY + radius * Math.sin(rad);
          coords.push({ x, y });
          gate.x = x;
          gate.y = y;
        });
        // Vẽ các đường nối có mũi tên theo RING_ORDER
        for (let i = 0; i < RING_ORDER.length - 1; i++) {
          const from = RING_ORDER[i];
          const to = RING_ORDER[i + 1];
          const x1 = coords[from].x,
            y1 = coords[from].y;
          const x2 = coords[to].x,
            y2 = coords[to].y;
          // Tính góc để vẽ mũi tên
          const line = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "line",
          );
          line.setAttribute("x1", x1);
          line.setAttribute("y1", y1);
          line.setAttribute("x2", x2);
          line.setAttribute("y2", y2);
          line.setAttribute("stroke", "#475569");
          line.setAttribute("stroke-width", "3");
          line.setAttribute("stroke-dasharray", "6 4");
          line.setAttribute("marker-end", "url(#arrowhead)");
          svg.appendChild(line);
        }
        // Vẽ các node và text
        GATES.forEach((gate, idx) => {
          const circle = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "circle",
          );
          circle.setAttribute("cx", gate.x);
          circle.setAttribute("cy", gate.y);
          circle.setAttribute("r", "28");
          circle.setAttribute("fill", "#1e293b");
          circle.setAttribute("stroke", "#3b82f6");
          circle.setAttribute("stroke-width", "3");
          circle.classList.add("gate-node");
          svg.appendChild(circle);

          const text = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "text",
          );
          text.setAttribute("x", gate.x);
          text.setAttribute("y", gate.y - 8);
          text.setAttribute("text-anchor", "middle");
          text.setAttribute("fill", "#f1f5f9");
          text.setAttribute("font-size", "14");
          text.setAttribute("font-weight", "bold");
          text.textContent = gate.name;
          svg.appendChild(text);

          const clockText = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "text",
          );
          clockText.setAttribute("x", gate.x);
          clockText.setAttribute("y", gate.y + 18);
          clockText.setAttribute("text-anchor", "middle");
          clockText.setAttribute("fill", "#94a3b8");
          clockText.setAttribute("font-size", "11");
          clockText.setAttribute("class", `clock-svg-${gate.port}`);
          clockText.textContent = "⏲️ --";
          svg.appendChild(clockText);
        });
        return coords;
      }

      // Cập nhật đồng hồ Lamport hiển thị trên SVG
      async function updateSvgClocks() {
        for (const gate of GATES) {
          try {
            const res = await fetch(`${gate.url}/api/parking/v2/lamport-clock`);
            const clock = await res.text();
            const textElem = document.querySelector(`.clock-svg-${gate.port}`);
            if (textElem) textElem.textContent = `⏲️ ${clock}`;
          } catch (e) {}
        }
      }

      // Lấy hàng đợi của 1 cổng và hiển thị bảng tạm bên dưới
      async function renderQueues() {
        const container = document.getElementById("queuesContainer");
        container.innerHTML = "";
        for (const gate of GATES) {
          try {
            const res = await fetch(`${gate.url}/api/parking/v2/temp-queue`);
            const queue = await res.json();
            const card = document.createElement("div");
            card.className = "queue-card";
            card.innerHTML = `
                    <h4>${gate.name} <span style="font-size:0.7rem;">(clock: <span id="clock-${gate.port}">--</span>)</span></h4>
                    <div class="queue-list">
                        ${
                          queue.length === 0
                            ? "<i>Trống</i>"
                            : queue
                                .map(
                                  (msg) => `
                            <div class="queue-item">
                                <span class="badge">v${msg.vong}</span> ${msg.hanhDong} | ${msg.noiDung} | clk=${msg.dongHo}
                            </div>
                        `,
                                )
                                .join("")
                        }
                    </div>
                `;
            container.appendChild(card);
            // Cập nhật clock trên card
            const clockRes = await fetch(
              `${gate.url}/api/parking/v2/lamport-clock`,
            );
            const clockVal = await clockRes.text();
            const clockSpan = document.getElementById(`clock-${gate.port}`);
            if (clockSpan) clockSpan.innerText = clockVal;
          } catch (e) {
            container.innerHTML += `<div>❌ Không lấy được dữ liệu từ ${gate.name}</div>`;
          }
        }
      }

      // Lấy lịch sử toàn cục từ 5 cổng
      async function fetchGlobalHistory() {
        let allEvents = [];
        for (const gate of GATES) {
          try {
            const res = await fetch(`${gate.url}/api/parking/v2/local-events`);
            const events = await res.json();
            events.forEach((ev) => (ev.gateName = gate.name));
            allEvents.push(...events);
          } catch (e) {}
        }
        allEvents.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
        if (currentFilter.trim() !== "") {
          allEvents = allEvents.filter(
            (ev) => ev.bienSo && ev.bienSo.includes(currentFilter),
          );
        }
        const tbody = document.getElementById("historyBody");
        tbody.innerHTML = "";
        for (const ev of allEvents.slice(-100)) {
          const row = tbody.insertRow();
          row.insertCell(0).innerText = new Date(
            ev.timestamp,
          ).toLocaleTimeString();
          row.insertCell(1).innerText = ev.gateName;
          row.insertCell(2).innerText = ev.vong;
          row.insertCell(3).innerHTML =
            `<span class="badge">${ev.hanhDong}</span>`;
          row.insertCell(4).innerText = ev.bienSo;
          row.insertCell(5).innerText = ev.lamportClock;
        }
      }

      // Animation chạy chấm sáng từ cổng này sang cổng kế tiếp (mô phỏng message đang được chuyển)
      function animateMessage(startGateIndex, duration = 800) {
        if (animationInterval) {
          clearInterval(animationInterval);
          const oldDot = document.querySelector(".moving-dot");
          if (oldDot) oldDot.remove();
        }
        const svg = document.getElementById("ringSvg");
        let currentIdx = startGateIndex;
        const endIdx = (startGateIndex + 1) % GATES.length; // chỉ chạy 1 bước
        const startX = GATES[currentIdx].x,
          startY = GATES[currentIdx].y;
        const endX = GATES[endIdx].x,
          endY = GATES[endIdx].y;

        const dot = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "circle",
        );
        dot.setAttribute("class", "moving-dot");
        dot.setAttribute("r", "7");
        dot.setAttribute("fill", "#facc15");
        dot.setAttribute("filter", "url(#glow)");
        svg.appendChild(dot);

        let progress = 0;
        const stepTime = 30;
        const steps = duration / stepTime;
        const dx = (endX - startX) / steps;
        const dy = (endY - startY) / steps;
        let x = startX,
          y = startY;
        const interval = setInterval(() => {
          progress++;
          x += dx;
          y += dy;
          dot.setAttribute("cx", x);
          dot.setAttribute("cy", y);
          if (progress >= steps) {
            clearInterval(interval);
            dot.remove();
          }
        }, stepTime);
        animationInterval = interval;
      }

      // Gửi yêu cầu VÀO/RA và kích hoạt animation (mô phỏng message bắt đầu từ cổng đó)
      async function sendWithAnimation(gate, action, bienSo) {
        if (!bienSo.trim()) {
          alert("Nhập biển số!");
          return;
        }
        const gateIndex = GATES.findIndex((g) => g.port === gate.port);
        // Animation: chấm sáng từ cổng này sang cổng tiếp theo (mô phỏng bước đầu tiên)
        animateMessage(gateIndex, 600);
        // Gọi API thực tế
        const endpoint = action === "VAO" ? "/vao-bai" : "/ra-bai";
        const url = `${gate.url}/api/parking/v2${endpoint}?bienSo=${encodeURIComponent(bienSo)}`;
        try {
          await fetch(url);
          // Sau 1 giây, refresh toàn bộ dữ liệu để thấy hàng đợi và lịch sử cập nhật
          setTimeout(() => refreshAllData(), 3000);
        } catch (e) {
          console.error(e);
          alert("Lỗi gọi cổng " + gate.name);
        }
      }

      // Tạo các nút điều khiển gắn liền với mỗi cổng (sẽ được đặt bên dưới vòng tròn)
      function addControlPanels() {
        const container = document.createElement("div");
        container.style.display = "flex";
        container.style.flexWrap = "wrap";
        container.style.justifyContent = "center";
        container.style.gap = "20px";
        container.style.margin = "20px 0";
        for (const gate of GATES) {
          const div = document.createElement("div");
          div.style.background = "#1e293b";
          div.style.padding = "10px 16px";
          div.style.borderRadius = "40px";
          div.style.display = "flex";
          div.style.gap = "8px";
          div.style.alignItems = "center";
          div.innerHTML = `
                <strong>${gate.name}</strong>
                <input type="text" id="plate-${gate.port}" placeholder="Biển số" size="12" style="width:100px;">
                <button onclick="sendWithAnimation(GATES.find(g=>g.port==${gate.port}), 'VAO', document.getElementById('plate-${gate.port}').value)">VÀO</button>
                <button class="ra" onclick="sendWithAnimation(GATES.find(g=>g.port==${gate.port}), 'RA', document.getElementById('plate-${gate.port}').value)">RA</button>
            `;
          container.appendChild(div);
        }
        const ringContainer = document.querySelector(".ring-container");
        ringContainer.insertAdjacentElement("afterend", container);
      }

      async function refreshAllData() {
        await updateSvgClocks();
        await renderQueues();
        await fetchGlobalHistory();
      }

      function clearFilter() {
        currentFilter = "";
        document.getElementById("plateFilter").value = "";
        fetchGlobalHistory();
      }

      // Khởi tạo
      window.onload = async () => {
        drawRing();
        addControlPanels();
        await refreshAllData();
        setInterval(() => {
          refreshAllData();
        }, 4000); // tự động refresh mỗi 4 giây
        document
          .getElementById("plateFilter")
          .addEventListener("input", (e) => {
            currentFilter = e.target.value;
            fetchGlobalHistory();
          });
      };
    </script>
  </body>
</html>
